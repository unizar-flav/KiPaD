<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>KiPaD</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stlite/browser@1.0.0/build/stlite.css" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module">
      import { mount } from "https://cdn.jsdelivr.net/npm/@stlite/browser@1.0.0/build/stlite.js";
      mount(
        {
          requirements: ["bokeh", "numpy", "matplotlib", "pandas", "plotly", "scikit-learn", "scipy", "streamlit"],
          entrypoint: "KiPaD_streamlit.py",
          files: {
            "KiPaD_streamlit.py": {
              url: "./KiPaD_streamlit.py",
            },
            "functions/general.py": {
              url: "./functions/general.py",
            },
            "functions/specific.py": {
              url: "./functions/specific.py",
            },
            ".streamlit/config.toml": {
              url: "./.streamlit/config.toml",
            },
          },
        },
        document.getElementById("root")
      );
    </script>
  </body>
</html>
